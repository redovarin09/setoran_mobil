name: 📦 Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Python & generate icon
        run: |
          pip install pillow
          python3 scripts/generate_icon.py

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # Decode pakai Python (paling reliable)
          python3 << 'PYEOF'
          import base64, os
          b64 = os.environ['KEYSTORE_BASE64'].strip()
          data = base64.b64decode(b64)
          with open('android/app/release.jks', 'wb') as f:
              f.write(data)
          print(f"Keystore decoded: {len(data)} bytes")
          PYEOF

          # Buat key.properties
          cat > android/key.properties << 'KEYPROPS'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          KEYPROPS

          # Verifikasi keystore valid
          keytool -list \
            -keystore android/app/release.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -alias ${{ secrets.KEY_ALIAS }}

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/SetoranMobil-v${{ github.run_number }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SetoranMobil-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/SetoranMobil-v${{ github.run_number }}.apk
          retention-days: 30
