name: setoran_mobil
description: Aplikasi manajemen setoran dan perbaikan kendaraan
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3+1
  path: ^1.9.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  excel: ^4.0.6
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
